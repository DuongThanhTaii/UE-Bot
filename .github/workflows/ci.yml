name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ===================
  # Lint & Type Check
  # ===================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter @ue-bot/shared --filter @ue-bot/webapp lint || true
        continue-on-error: true

      - name: Type Check (database)
        run: pnpm --filter @ue-bot/database typecheck

      - name: Type Check (bridge-service)
        run: pnpm --filter @ue-bot/bridge-service typecheck
        continue-on-error: true

      - name: Type Check (webapp)
        run: pnpm --filter @ue-bot/webapp typecheck
        continue-on-error: true

  # ===================
  # Build
  # ===================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ue-bot/shared build

      - name: Build agent-core
        run: pnpm --filter @ue-bot/agent-core build

      - name: Build database
        run: pnpm --filter @ue-bot/database build

      - name: Build bridge-service
        run: pnpm --filter @ue-bot/bridge-service build

      - name: Build webapp
        run: pnpm --filter @ue-bot/webapp build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL: ws://localhost:8080

  # ===================
  # Test
  # ===================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test agent-core
        run: pnpm --filter @ue-bot/agent-core test
        env:
          CI: true

      - name: Test database
        run: pnpm --filter @ue-bot/database test
        env:
          CI: true

      - name: Test bridge-service
        run: pnpm --filter @ue-bot/bridge-service test
        env:
          CI: true
